<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Saigon Centre — Theme Customization</title>
  <style>
    html, body { margin: 0; height: 100%; background: #fff; overflow: hidden; }
    wayfinder-map { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "qrcode-generator": "../qa-shims/qrcode-generator.js"
    }
  }
  </script>
</head>
<body>
  <!-- Default controls + custom label and control colors. Label text/background
       and the control button foreground/background (normal + active) are themed
       via attributes; everything else falls back to the built-in defaults. -->
  <wayfinder-map
    data-url="../datas/SGC_v001.json"
    default-floor="L3"
    level-selector
    search-control
    enable-rotation
    map-label-font-color="#1d3557"
    map-label-background-color="#f1faee"
    control-fg-color="#1d3557"
    control-bg-color="#ffffff"
    control-active-fg-color="#ffffff"
    control-active-bg-color="#e63946"
  ></wayfinder-map>

  <script type="module">
    import "../dist/wayfinder-map.esm.js";

    const map = document.querySelector("wayfinder-map");
    map.addEventListener("error", (event) => {
      console.error("Map error:", event.detail?.error || event);
    });
  </script>
</body>
</html>
