<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Saigon Centre — Bare Canvas</title>
  <style>
    html, body { margin: 0; height: 100%; background: #fff; overflow: hidden; }
    wayfinder-map { display: block; width: 100vw; height: 100vh; }
  </style>
  <!-- The shipped dist bundle externalizes qrcode-generator (a Phase-3 dep that
       is not installed). The map never exercises QR here, so the QA stub satisfies
       the import. rbush IS bundled into dist, so it needs no mapping. -->
  <script type="importmap">
  {
    "imports": {
      "qrcode-generator": "../qa-shims/qrcode-generator.js"
    }
  }
  </script>
</head>
<body>
  <wayfinder-map
    data-url="../datas/SGC_v001.json"
    default-floor="L3"
  ></wayfinder-map>

  <script type="module">
    import "../dist/wayfinder-map.esm.js";

    const map = document.querySelector("wayfinder-map");
    map.addEventListener("error", (event) => {
      console.error("Map error:", event.detail?.error || event);
    });
  </script>
</body>
</html>
