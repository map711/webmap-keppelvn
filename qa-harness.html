<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA floor-rendering harness</title>
  <style>
    html, body { margin: 0; height: 100%; background:#fff; }
    wayfinder-map { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "qrcode-generator": "./qa-shims/qrcode-generator.js",
      "rbush/index.js": "./node_modules/rbush/index.js",
      "rbush": "./node_modules/rbush/index.js",
      "quickselect": "./node_modules/quickselect/index.js"
    }
  }
  </script>
  <script type="module">
    import './src/index.js';
    const el = document.createElement('wayfinder-map');
    el.id = 'map';
    el.setAttribute('data-url', './datas/SGC_v001.json');
    el.setAttribute('default-floor', 'L3');
    window.__qa = { events: [], errors: [] };
    for (const t of ['data-loaded','floor-changed','location-tap','error','tap-floor','tap-location']) {
      el.addEventListener(t, (e) => window.__qa.events.push({ type: t, detail: safe(e.detail) }));
    }
    window.addEventListener('error', (e)=>window.__qa.errors.push(String(e.message||e)));
    function safe(d){ try { return JSON.parse(JSON.stringify(d)); } catch { return String(d); } }
    document.body.appendChild(el);
    window.__qa.el = el;
  </script>
</head>
<body></body>
</html>
